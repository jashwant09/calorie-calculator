<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fitness Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card main">
        <h1>🏋️ Fitness Calculator</h1>
        <p class="subtitle">Get your personalized diet & fitness plan</p>
    </div>

    <div class="card">
        <label>⚡ Fitness Level</label>
        <select id="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="athlete">Athlete</option>
        </select>
    </div>

    <div class="card">
        <label>⚖ Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70">
    </div>

    <div class="card">
        <label>📏 Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 170">
    </div>

    <div class="card">
        <label>🎯 Goal</label>
        <select id="goalSelect">
            <option value="fatloss">Fat Loss</option>
            <option value="maintain">Maintenance</option>
            <option value="gain">Muscle Gain</option>
        </select>
    </div>

    <div class="card">
        <label>🥗 Food Preference</label>
        <select id="foodType">
            <option value="veg">Vegetarian</option>
            <option value="nonveg">Non-Vegetarian</option>
        </select>
    </div>



    <button class="main-btn" onclick="calculatePlan()">🚀 Calculate Plan</button>

</div>

<script src="script.js"></script>
</body>
</html>
